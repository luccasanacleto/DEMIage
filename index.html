<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dado da Motosserra do Demi</title>

  <!-- Ícone -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <!-- App Mobile -->
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      background: #111;

      color: #eee;

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: flex-start;

      min-height: 100vh;

      padding: 20px;
    }

    .container {

      background: #1b1b1b;

      padding: 24px;

      border-radius: 12px;

      width: 100%;

      max-width: 750px;

      box-shadow: 0 0 20px rgba(0,0,0,0.5);

      overflow: hidden;
    }

    .logo {

      width: 110px;
      height: 110px;

      object-fit: cover;

      display: block;

      margin: 0 auto 18px auto;

      border-radius: 24px;

      border: 2px solid rgba(255,255,255,0.06);
    }

    h1 {

      text-align: center;

      margin-top: 0;
      margin-bottom: 5px;

      color: #eee;

      font-size: clamp(28px, 5vw, 42px);
    }

    .subtitulo {

      text-align: center;

      color: #9b9b9b;

      font-size: 15px;

      margin-bottom: 25px;

      font-style: italic;

      letter-spacing: 1px;
    }

    p {

      text-align: center;

      font-size: 18px;

      margin-bottom: 15px;
    }

    .botoes {

      display: flex;

      justify-content: center;

      gap: 10px;

      flex-wrap: wrap;
    }

    button {

      background: #5b21b6;

      border: 2px solid transparent;

      color: white;

      padding: 12px 22px;

      border-radius: 8px;

      cursor: pointer;

      font-size: 16px;

      transition: background 0.2s, border 0.2s;
    }

    button:hover {

      background: #7c3aed;
    }

    button.selecionado {

      border: 2px solid white;

      background: #6d28d9;
    }

    pre {

      background: #0f0f0f;

      padding: 18px;

      border-radius: 10px;

      margin-top: 20px;

      white-space: pre-wrap;

      word-break: break-word;

      overflow-x: auto;

      line-height: 1.6;

      width: 100%;
      max-width: 100%;
    }

    .erro {

      color: #ff6b6b;

      text-align: center;

      font-weight: bold;

      white-space: normal;
    }

    @media (max-width: 600px) {

      body {
        padding: 14px;
      }

      .container {
        padding: 18px;
      }

      .logo {

        width: 90px;
        height: 90px;
      }

      pre {
        font-size: 14px;
      }

      button {
        width: 100%;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <img src="icon.png" alt="Logo do app" class="logo">

    <h1>Dado da Motosserra do Demi</h1>

    <div class="subtitulo">
      DEMIage da motosserra.
    </div>

    <p>Quantas motosserras?</p>

    <div class="botoes">

      <button
        id="moto1"
        onclick="selecionarMotosserras(1)"
      >
        1 Motosserra
      </button>

      <button
        id="moto2"
        onclick="selecionarMotosserras(2)"
      >
        2 Motosserras
      </button>

    </div>

    <div id="areaCritico" style="display:none; margin-top:20px;">

      <p>Quantas deram crítico?</p>

      <div class="botoes">

        <button
          id="crit0"
          onclick="rolar(0)"
        >
          Sem Crítico
        </button>

        <button
          id="crit1"
          onclick="rolar(1)"
        >
          1 Crítico
        </button>

        <button
          id="crit2"
          onclick="rolar(2)"
        >
          2 Críticos
        </button>

      </div>

    </div>

    <pre id="resultado"></pre>

  </div>

  <script>

    let motosserras = 0;

    function selecionarMotosserras(qtd) {

      // desativa clicando novamente
      if (motosserras === qtd) {

        motosserras = 0;

        document.getElementById("moto1")
          .classList.remove("selecionado");

        document.getElementById("moto2")
          .classList.remove("selecionado");

        document.getElementById("crit0")
          .classList.remove("selecionado");

        document.getElementById("crit1")
          .classList.remove("selecionado");

        document.getElementById("crit2")
          .classList.remove("selecionado");

        document.getElementById("areaCritico")
          .style.display = "none";

        document.getElementById("resultado")
          .textContent = "";

        return;
      }

      motosserras = qtd;

      document.getElementById("areaCritico")
        .style.display = "block";

      document.getElementById("resultado")
        .textContent = "";

      // limpa seleções
      document.getElementById("moto1")
        .classList.remove("selecionado");

      document.getElementById("moto2")
        .classList.remove("selecionado");

      document.getElementById("crit0")
        .classList.remove("selecionado");

      document.getElementById("crit1")
        .classList.remove("selecionado");

      document.getElementById("crit2")
        .classList.remove("selecionado");

      // adiciona seleção
      document.getElementById(`moto${qtd}`)
        .classList.add("selecionado");
    }

    function d6() {

      return Math.floor(Math.random() * 6) + 1;
    }

    // principal explosivo
    function rolarPrincipal() {

      let rolagens = [];

      let total = 0;

      function explosao() {

        let valor = d6();

        // rerrola 1 apenas UMA vez
        if (valor === 1) {

          rolagens.push(1);

          valor = d6();
        }

        rolagens.push(valor);

        total += valor;

        // 6 continua explodindo infinitamente
        if (valor === 6) {

          explosao();
        }
      }

      explosao();

      return {

        rolagens,
        total
      };
    }

    // bônus sem explosão
    function rolarBonus() {

      let rolagens = [];

      let valor = d6();

      // rerrola 1 apenas UMA vez
      if (valor === 1) {

        rolagens.push(1);

        valor = d6();
      }

      rolagens.push(valor);

      return {

        rolagens,
        total: valor
      };
    }

    function rolar(criticos) {

      const botaoAtual =
        document.getElementById(`crit${criticos}`);

      const jaSelecionado =
        botaoAtual.classList.contains("selecionado");

      // se clicar novamente no mesmo botão
      if (jaSelecionado) {

        document.getElementById("crit0")
          .classList.remove("selecionado");

        document.getElementById("crit1")
          .classList.remove("selecionado");

        document.getElementById("crit2")
          .classList.remove("selecionado");

        document.getElementById("resultado")
          .textContent = "";

        return;
      }

      // limpa seleções
      document.getElementById("crit0")
        .classList.remove("selecionado");

      document.getElementById("crit1")
        .classList.remove("selecionado");

      document.getElementById("crit2")
        .classList.remove("selecionado");

      // ativa seleção
      botaoAtual.classList.add("selecionado");

      // erro
      if (criticos > motosserras) {

        document.getElementById("resultado").innerHTML =
        `<div class="erro">
          Erro, apenas uma motosserra sendo utilizada.
        </div>`;

        return;
      }

      // 4d6 por motosserra
      let dadosPrincipais = motosserras * 4;

      // crítico dobra apenas principal
      dadosPrincipais += criticos * 4;

      // 2d6 bônus por motosserra
      let dadosBonus = motosserras * 2;

      let texto = "";

      texto += "=== ROLAGEM PRINCIPAL ===\n";

      let totalPrincipal = 0;

      for (let i = 1; i <= dadosPrincipais; i++) {

        let resultado = rolarPrincipal();

        texto += `Dado ${i}: [${resultado.rolagens.join(", ")}]\n`;

        totalPrincipal += resultado.total;
      }

      texto += `\nTotal principal: ${totalPrincipal}\n\n`;

      texto += `=== +${dadosBonus}d6 BÔNUS ===\n`;

      let totalBonus = 0;

      for (let i = 1; i <= dadosBonus; i++) {

        let bonus = rolarBonus();

        texto += `Bônus ${i}: [${bonus.rolagens.join(", ")}]\n`;

        totalBonus += bonus.total;
      }

      texto += `\nTotal bônus: ${totalBonus}\n\n`;

      texto +=
      `TOTAL GERAL: ${totalPrincipal} + ${totalBonus} = ${totalPrincipal + totalBonus}`;

      document.getElementById("resultado")
        .textContent = texto;
    }

  </script>

</body>
</html>
