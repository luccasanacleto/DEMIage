<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dado da Motosserra do Demi</title>

  <!-- Ícone -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <!-- App Mobile -->
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #1b1b1b;
      padding: 24px;
      border-radius: 12px;

      width: 100%;
      max-width: 750px;

      box-shadow: 0 0 20px rgba(0,0,0,0.5);

      overflow: hidden;
    }

    .logo {
      width: 110px;
      height: 110px;

      object-fit: cover;

      display: block;

      margin: 0 auto 18px auto;

      border-radius: 24px;

      box-shadow:
        0 0 20px rgba(0,0,0,0.6),
        0 0 12px rgba(124, 58, 237, 0.3);

      border: 2px solid rgba(255,255,255,0.06);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 5px;

      color: #eee;
      font-size: clamp(28px, 5vw, 42px);
    }

    .subtitulo {
      text-align: center;
      color: #9b9b9b;
      font-size: 15px;
      margin-bottom: 25px;
      font-style: italic;
      letter-spacing: 1px;
    }

    p {
      text-align: center;
      font-size: 18px;
      margin-bottom: 15px;
    }

    .botoes {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: #5b21b6;
      border: none;
      color: white;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #7c3aed;
      transform: scale(1.03);
    }

    pre {
      background: #0f0f0f;
      padding: 18px;
      border-radius: 10px;

      margin-top: 20px;

      white-space: pre-wrap;
      word-break: break-word;

      overflow-x: auto;

      line-height: 1.6;

      width: 100%;
      max-width: 100%;
    }

    @media (max-width: 600px) {

      body {
        padding: 14px;
      }

      .container {
        padding: 18px;
      }

      .logo {
        width: 90px;
        height: 90px;
      }

      pre {
        font-size: 14px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <img src="icon.png" alt="Logo do app" class="logo">

    <h1>Dado da Motosserra do Demi</h1>

    <div class="subtitulo">
      DEMIage da motosserra.
    </div>

    <p>Foi crítico?</p>

    <div class="botoes">
      <button onclick="rolar(false)">Não</button>
      <button onclick="rolar(true)">Sim</button>
    </div>

    <pre id="resultado"></pre>

  </div>

  <script>
    function d6() {
      return Math.floor(Math.random() * 6) + 1;
    }

    // Dado principal explosivo
    function rolarPrincipal() {

      let rolagens = [];
      let total = 0;

      function explosao() {

        let valor = d6();

        // reroll de 1
        while (valor === 1) {
          rolagens.push(1);
          valor = d6();
        }

        rolagens.push(valor);

        total += valor;

        // explode no 6
        if (valor === 6) {
          explosao();
        }
      }

      explosao();

      return {
        rolagens,
        total
      };
    }

    // bônus sem explosão
    function rolarBonus() {

      let rolagens = [];

      let valor = d6();

      while (valor === 1) {
        rolagens.push(1);
        valor = d6();
      }

      rolagens.push(valor);

      return {
        rolagens,
        total: valor
      };
    }

    function rolar(critico) {

      let quantidadePrincipal = critico ? 16 : 8;

      let texto = "";

      texto += "=== ROLAGEM PRINCIPAL ===\n";

      let totalPrincipal = 0;

      for (let i = 1; i <= quantidadePrincipal; i++) {

        let resultado = rolarPrincipal();

        texto += `Dado ${i}: [${resultado.rolagens.join(", ")}]\n`;

        totalPrincipal += resultado.total;
      }

      texto += `\nTotal principal: ${totalPrincipal}\n\n`;

      texto += "=== +4d6 BÔNUS ===\n";

      let totalBonus = 0;

      for (let i = 1; i <= 4; i++) {

        let bonus = rolarBonus();

        texto += `Bônus ${i}: [${bonus.rolagens.join(", ")}]\n`;

        totalBonus += bonus.total;
      }

      texto += `\nTotal bônus: ${totalBonus}\n\n`;

      texto += `TOTAL GERAL: ${totalPrincipal} + ${totalBonus} = ${totalPrincipal + totalBonus}`;

      document.getElementById("resultado").textContent = texto;
    }
  </script>

</body>
</html>
